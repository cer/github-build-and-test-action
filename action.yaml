name: 'Build and Test'
description: 'Build, deploy to Kind cluster, run integration tests, and collect diagnostics'

inputs:
  github-user:
    description: 'GitHub username for Docker registry authentication'
    required: true
  github-token:
    description: 'GitHub token for Docker registry authentication'
    required: true
  github-docker-server:
    description: 'Docker registry server URL (e.g., ghcr.io/owner)'
    required: true

runs:
  using: composite
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false

    - name: Install K8s tools
      shell: bash
      run: sudo ./.github/workflows/install-k8s-tools.sh

    - name: Validate K8S manifests
      shell: bash
      run: ./test/validate-k8s-yaml.sh

    - name: Build
      shell: bash
      run: ./gradlew build --build-cache

    - name: Create Kind Cluster
      shell: bash
      env:
        GITHUB_USER: ${{ inputs.github-user }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_DOCKER_SERVER: ${{ inputs.github-docker-server }}
      run: ./manage/create-kind-cluster.sh

    - name: Test Kind installation
      shell: bash
      run: ./test/test-kind-cluster.sh

    - name: Install infrastructure services
      shell: bash
      run: ./manage/install-infrastructure-services.sh

    - name: Test Kafka
      shell: bash
      run: ./test/test-kafka.sh

    - name: Test Get JWT
      shell: bash
      run: ./test/get-jwt.sh

    - name: Test customer service
      shell: bash
      run: ./test/test-all-services.sh

    - name: Save pod logs
      if: always()
      shell: bash
      run: ./.github/workflows/dump-k8s.sh

    - name: Get container logs
      if: always()
      shell: bash
      run: ./.github/workflows/print-container-logs.sh

    - name: Save test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          **/build/reports
          **/build/test-results

    - name: Save container logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: container-logs
        path: ~/container-logs

    - name: Undeploy services
      if: always()
      shell: bash
      run: ./manage/undeploy-services.sh

    - name: Delete Kind Cluster
      if: always()
      shell: bash
      run: ./manage/delete-kind-cluster.sh
