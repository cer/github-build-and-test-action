name: 'Build and Test'
description: 'Set up JDK and Gradle, and build the Java project'

runs:
  using: composite
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false

    - name: Build
      shell: bash
      run: ./gradlew build --build-cache
